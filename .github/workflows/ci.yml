name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build + deterministic test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile (node + core)
        run: ./gradlew compileJava --no-daemon --console=plain
      - name: Deterministic JVM test suite (the gate)
        run: ./gradlew runTests --no-daemon --console=plain

  integration:
    name: NetNode integration tests (socket-binding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Integration suite (mTLS / read-peer split / eclipse)
        run: ./gradlew runIntegrationTests --no-daemon --console=plain
