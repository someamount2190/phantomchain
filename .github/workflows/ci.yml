name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build + deterministic test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile (node + core)
        run: ./gradlew compileJava --no-daemon --console=plain
      - name: Android-engine split guard (src/core compiles alone)
        run: ./gradlew compileCoreIsolated --no-daemon --console=plain
      - name: Test-coverage audit (every suite classified)
        run: ./gradlew auditTestCoverage --no-daemon --console=plain
      - name: Deterministic JVM test suite (the gate)
        run: ./gradlew runTests --no-daemon --console=plain

  integration:
    name: NetNode integration tests (socket-binding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Integration suite (mTLS / read-peer split / eclipse)
        run: ./gradlew runIntegrationTests --no-daemon --console=plain

  android-engine-compile:
    name: Android build (shared-engine compatibility)
    # Compiles the Android app, which embeds src/core. This is the ONLY guard that catches Android-only
    # breakage in the shared engine — e.g. org.json's JSONException is unchecked on Maven's org.json (so
    # compileCoreIsolated / the JVM gate miss it) but CHECKED on Android, so a missing `throws` fails only
    # here. compileDebugJavaWithJavac runs the Java compile without dexing/packaging/emulator (fast).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install SDK platform + build-tools (compileSdk 34)
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Compile Android debug sources (src/app + embedded src/core)
        run: gradle -p src/android compileDebugJavaWithJavac --no-daemon --console=plain
